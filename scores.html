<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardy Scores</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="main-title">team scores</h1>
            <a href="index.html" class="scores-link">back to game</a>
        </header>

        <div class="scoreboard">
            <div class="team-score">
                <div class="team-name">boy basement</div>
                <div class="team-photos">
                    <div class="photo-holder">
                        <img src="images/owen.JPG" alt="boy basement person 1">
                    </div>
                    <div class="photo-holder">
                        <img src="images/kevin.JPG" alt="boy basement person 2">
                    </div>
                </div>
                <div class="score-display">
                    <span id="team1-score" class="score">0</span>
                </div>
                <div class="score-buttons">
                    <button class="btn-add" onclick="addPoints(1, 100)">+100</button>
                    <button class="btn-add" onclick="addPoints(1, 500)">+500</button>
                    <button class="btn-sub" onclick="addPoints(1, -100)">-100</button>
                    <button class="btn-reset" onclick="resetScore(1)">reset</button>
                </div>
            </div>

            <div class="team-score">
                <div class="team-name">third floor</div>
                <div class="team-photos">
                    <div class="photo-holder">
                        <img src="images/sam.JPG" alt="third floor person 1">
                    </div>
                    <div class="photo-holder">
                        <img src="images/hope.JPG" alt="third floor person 2">
                    </div>
                </div>
                <div class="score-display">
                    <span id="team2-score" class="score">0</span>
                </div>
                <div class="score-buttons">
                    <button class="btn-add" onclick="addPoints(2, 100)">+100</button>
                    <button class="btn-add" onclick="addPoints(2, 500)">+500</button>
                    <button class="btn-sub" onclick="addPoints(2, -100)">-100</button>
                    <button class="btn-reset" onclick="resetScore(2)">reset</button>
                </div>
            </div>

            <div class="team-score">
                <div class="team-name">fourth floor</div>
                <div class="team-photos">
                    <div class="photo-holder">
                        <img src="images/ella.JPG" alt="fourth floor person 1">
                    </div>
                    <div class="photo-holder">
                        <img src="images/lauren.JPG" alt="fourth floor person 2">
                    </div>
                </div>
                <div class="score-display">
                    <span id="team3-score" class="score">0</span>
                </div>
                <div class="score-buttons">
                    <button class="btn-add" onclick="addPoints(3, 100)">+100</button>
                    <button class="btn-add" onclick="addPoints(3, 500)">+500</button>
                    <button class="btn-sub" onclick="addPoints(3, -100)">-100</button>
                    <button class="btn-reset" onclick="resetScore(3)">reset</button>
                </div>
            </div>
        </div>

        <div class="reset-all">
            <button type="button" onclick="endGame()" class="btn-end-game">end game</button>
            <button type="button" onclick="resetAllScores()" class="btn-reset-all">reset all scores</button>
        </div>
    </div>

    <div id="winnerPopup" class="winner-popup">
        <div class="winner-popup-content">
            <button class="winner-close" onclick="closeWinnerPopup()">&times;</button>
            <h2 id="winnerTitle">Winner</h2>
            <div id="winnerPhotos" class="winner-photos"></div>
            <p id="winnerMessage" class="winner-message"></p>
        </div>
    </div>

    <audio id="appluseAudio" preload="auto" style="display: none;">
        <source src="data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQIAAAAAAA==" type="audio/wav">
    </audio>

    <script src="scores.js"></script>
</body>
</html>
