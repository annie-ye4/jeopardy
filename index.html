    <!-- Question Modal -->
    <div id="questionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Question</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="question-section">
                    <h3>Question:</h3>
                    <div class="question-display" id="questionDisplay">
                        <p id="questionText">No question</p>
                    </div>
                </div>
                <div class="answer-section">
                    <button onclick="toggleAnswer()" class="btn-reveal">Reveal Answer</button>
                    <div class="answer-display hidden" id="answerDisplay">
                        <p id="answerText">No answer</p>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="markAnswered()" class="btn-mark">Mark as Answered</button>
                <button onclick="closeModal()" class="btn-close">Close</button>
            </div>
        </div>
    </div>

    <!-- Double Jeopardy Popup -->
